name: CI-CD HR-PULSE

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # JOB 1 : Tests et Qualité du code
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' 

      - name: Installation des dépendances
        working-directory: ./HR-pulse-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Linting avec Ruff
        working-directory: ./HR-pulse-backend
        run: ruff check .

      - name: Exécution des tests Pytest
        working-directory: ./HR-pulse-backend
        run: pytest

  # JOB 2 : Build et Push des images Docker
  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # On ne push que lors d'un vrai commit
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./HR-pulse-backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hr-pulse-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hr-pulse-backend:${{ github.sha }}

      # Build Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./HR-pulse-frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hr-pulse-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hr-pulse-frontend:${{ github.sha }}