name: CI-CD HR-PULSE

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Configuration de Python
        run: uv python install 3.12

      - name: Installation des dépendances (via pyproject.toml)
        working-directory: ./HR-pulse-backend
        run: |
          uv sync --frozen # Installe les dépendances définies dans pyproject.toml / uv.lock

      - name: Linting avec Ruff
        working-directory: ./HR-pulse-backend
        run: uv run ruff check .

      - name: Exécution des tests Pytest
        working-directory: ./HR-pulse-backend
        run: uv run pytest

  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./HR-pulse-backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hr-pulse-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./HR-pulse-frontend/hr-pulse-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hr-pulse-frontend:latest