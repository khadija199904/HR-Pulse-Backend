name: HR-PULSE Backend CI-CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-lint:
    runs-on: self-hosted
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

     
      - name: Ensure uv is in PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Installation des dépendances
        
        run: uv sync --frozen

      - name: Linting avec Ruff
        run: uv run ruff check .

      - name: Exécution des tests Pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
          AZURE_DB_URL: ${{ secrets.AZURE_DB_URL }}
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          uv run pytest
          
  build-and-push:
    needs: test-and-lint
    
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      
      - name: Connexion au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hr-pulse-backend:latest